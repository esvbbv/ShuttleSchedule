<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airport Shuttle</title>

  <style>
    body {
      margin: 0;
      background: #16175d;
      color: #b7d63f;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT SIDE (TEXT) */
    .left {
      width: 65%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 5rem;
      margin: 0 0 20px 0;
      font-weight: 900;
    }

    h2 {
      font-size: 2.5rem;
      margin: 0 0 40px 0;
      font-weight: 800;
    }

    .minutes {
      font-size: 8rem;
      font-weight: 900;
      margin: 20px 0;
    }

    .label {
      font-size: 3rem;
      font-weight: 800;
    }

    .next-time {
      font-size: 2rem;
      color: white;
      margin-top: 20px;
    }

    /* RIGHT SIDE (IMAGES) */
    .right {
      width: 35%;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .image-top, .image-bottom {
      flex: 1;
      overflow: hidden;
    }

    .image-top img,
    .image-bottom img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* LOGO */
    .logo {
      position: fixed;
      left: 40px;
      bottom: 30px;
      z-index: 10;
    }

    .logo img {
      width: 140px;
      height: auto;
    }
  </style>
</head>

<body>

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Airport Shuttle</h1>
    <h2>Next departure from Lower Lobby drive in:</h2>

    <div class="minutes" id="minutes">--</div>
    <div class="label">minutes</div>

    <div class="next-time" id="nextTime">Loading schedule...</div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="image-top">
      <img src="map.png" alt="Shuttle Route Map">
    </div>
    <div class="image-bottom">
      <img src="shuttlestop.png" alt="Shuttle Pickup Location">
    </div>
  </div>

  <!-- LOGO -->
  <div class="logo">
    <img src="doubletree-logo.png" alt="DoubleTree Logo">
  </div>

  <script>
    const SHEET_CSV_URL = "PASTE_YOUR_URL_HERE";

    function parseTimeToMinutes(timeStr) {
      if (!timeStr) return null;
      timeStr = String(timeStr).trim().replace(/^"|"$/g, "");

      const dateObj = new Date(timeStr);
      if (!isNaN(dateObj)) {
        return dateObj.getHours() * 60 + dateObj.getMinutes();
      }

      const match = timeStr.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (match) {
        let h = parseInt(match[1], 10);
        let m = parseInt(match[2], 10);
        let ampm = match[3].toUpperCase();

        if (ampm === "PM" && h !== 12) h += 12;
        if (ampm === "AM" && h === 12) h = 0;

        return h * 60 + m;
      }

      return null;
    }

    function formatTime(mins) {
      let h = Math.floor(mins / 60);
      let m = mins % 60;
      let ampm = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      return `${h}:${String(m).padStart(2, "0")} ${ampm}`;
    }

    async function update() {
      try {
        const res = await fetch(SHEET_CSV_URL + "&t=" + Date.now());
        const text = await res.text();

        const rows = text.split("\n").slice(1);

        const times = rows
          .map(r => parseTimeToMinutes(r))
          .filter(t => t !== null)
          .sort((a, b) => a - b);

        const now = new Date();
        const current = now.getHours() * 60 + now.getMinutes();

        let next = times.find(t => t >= current);

        if (!next) {
          document.getElementById("minutes").textContent = "--";
          document.getElementById("nextTime").textContent = "No more departures today";
          return;
        }

        document.getElementById("minutes").textContent = next - current;
        document.getElementById("nextTime").textContent =
          "Next departure: " + formatTime(next);

      } catch {
        document.getElementById("nextTime").textContent = "Schedule unavailable";
      }
    }

    update();
    setInterval(update, 60000);
  </script>

</body>
</html>
