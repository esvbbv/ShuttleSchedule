<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airport Shuttle</title>

  <style>
    body {
      margin: 0;
      background: #16175d;
      color: #b7d63f;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

/* LEFT SIDE (TEXT) */
.left {
  width: 70%;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  align-items: center;
  text-align: center;
  padding: 3vw;
  height: 100%;
}

.left h1 {
  font-size: 6vw;
  font-weight: 900;
  margin: 0;
}

.left h2 {
  font-size: 3.2vw;
  font-weight: 800;
  margin: 0;
  max-width: 90%;
}

.minutes {
  font-weight: 900;
  line-height: 1;
  margin: 1vw 0;
  transition: transform 0.35s ease, opacity 0.35s ease, font-size 0.35s ease;
  animation: pulseMinutes 4s ease-in-out infinite;
}

.minutes.digits-none {
  font-size: 10vw;
}

.minutes.digits-1 {
  font-size: 18vw;
}

.minutes.digits-2 {
  font-size: 15vw;
}

.minutes.digits-3 {
  font-size: 11vw;
}

.minutes.update-pop {
  transform: scale(1.08);
}
    
.label {
  font-size: 4vw;
  font-weight: 800;
}

.next-time {
  font-size: 3vw;
  margin-top: 1vw;
}

@keyframes pulseMinutes {
  0%, 100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.04);
    opacity: 0.96;
  }
}

.minutes.update-pop {
  animation: none;
  transform: scale(1.08);
}

    /* RIGHT SIDE (IMAGES) */
.right {
  width: 35%;
  display: flex;
  flex-direction: column;
  height: 100%;
  box-sizing: border-box;
}

.image-top {
  height: 80%;
  overflow: hidden;
  display: flex;
  align-items: top;
  justify-content: center;
}

.image-bottom {
  height: 20%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.image-top img,
.image-bottom img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  background: #16175d;
}

.image-bottom img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
  
  /* LOGO */
  .logo {
    position: fixed;
    left: 40px; 
    bottom: 30px; 
    z-index: 10; 
  }
  .logo img {
      width: 140px;
      height: auto;
    }
  </style>
</head>

<body>

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Airport Shuttle</h1>
    <h2>Next departure from Lower Lobby drive in:</h2>

    <div class="minutes" id="minutes">--</div>
    <div class="label">minutes</div>

    <div class="next-time" id="nextTime">Loading schedule...</div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="image-top">
      <img src="map.png" alt="Shuttle Route Map">
    </div>
    <div class="image-bottom">
      <img src="shuttlestop.png" alt="Shuttle Pickup Location">
    </div>
  </div>

  <!-- LOGO -->
  <div class="logo">
    <img src="doubletree-logo.png" alt="DoubleTree Logo">
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAHdpEZv0Hl9VNXoBJHsZDU7YlFWdqjfMk9OI6k4z1H0WCPmUkhsJIgheofIvB6HoPBGep1sl2VrCG/pub?gid=0&single=true&output=csv";

    function parseTimeToMinutes(timeStr) {
    if (!timeStr) return null;
    timeStr = String(timeStr).trim().replace(/^"|"$/g, "");

    const dateObj = new Date(timeStr);
    if (!isNaN(dateObj)) {
      return dateObj.getHours() * 60 + dateObj.getMinutes();
    }

    const match = timeStr.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (match) {
      let h = parseInt(match[1], 10);
      let m = parseInt(match[2], 10);
      let ampm = match[3].toUpperCase();

      if (ampm === "PM" && h !== 12) h += 12;
      if (ampm === "AM" && h === 12) h = 0;

      return h * 60 + m;
    }

    return null;
  }

  function formatTime(mins) {
    let h = Math.floor(mins / 60);
    let m = mins % 60;
    let ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    return `${h}:${String(m).padStart(2, "0")} ${ampm}`;
  }

  function setMinuteSize(value) {
    const minutesEl = document.getElementById("minutes");
    const text = String(value);
    const digits = text.replace(/\D/g, "").length;

    minutesEl.classList.remove("digits-none", "digits-1", "digits-2", "digits-3");

    if (digits === 0) {
      minutesEl.classList.add("digits-none");
    } else if (digits === 1) {
      minutesEl.classList.add("digits-1");
    } else if (digits === 2) {
      minutesEl.classList.add("digits-2");
    } else {
      minutesEl.classList.add("digits-3");
    }
  }

  function animateMinuteUpdate() {
    const minutesEl = document.getElementById("minutes");
    minutesEl.classList.remove("update-pop");
    void minutesEl.offsetWidth;
    minutesEl.classList.add("update-pop");

    setTimeout(() => {
      minutesEl.classList.remove("update-pop");
    }, 350);
  }

  function showNoService(message) {
    const minutesEl = document.getElementById("minutes");
    const nextTimeEl = document.getElementById("nextTime");

    minutesEl.textContent = "--";
    setMinuteSize("--");
    nextTimeEl.textContent = message;
  }

  async function update() {
    try {
      const separator = SHEET_CSV_URL.includes("?") ? "&" : "?";
      const res = await fetch(SHEET_CSV_URL + separator + "t=" + Date.now());
      const text = await res.text();

      const rows = text.split("\n").slice(1);

      const times = rows
        .map(r => parseTimeToMinutes(r))
        .filter(t => t !== null)
        .sort((a, b) => a - b);

      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();

      const next = times.find(t => t >= current);

      if (next === undefined) {
        showNoService("No more departures today");
        return;
      }

      const minutesAway = next - current;
      const minutesEl = document.getElementById("minutes");
      const nextTimeEl = document.getElementById("nextTime");

      if (minutesEl.textContent !== String(minutesAway)) {
        minutesEl.textContent = minutesAway;
        setMinuteSize(minutesAway);
        animateMinuteUpdate();
      } else {
        setMinuteSize(minutesAway);
      }

      nextTimeEl.textContent = "at: " + formatTime(next);

    } catch (error) {
      showNoService("Schedule unavailable");
      console.error("Schedule update failed:", error);
    }
  }

  update();
  setInterval(update, 60000);
</script>

</body>
</html>
