<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shuttle Schedule</title>

  <style>
    body {
      margin: 0;
      background: #16175d;
      color: #b7d63f;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 1400px;
    }

    h1 {
      font-size: 5rem;
      margin: 0 0 20px 0;
      font-weight: 900;
    }

    h2 {
      font-size: 3rem;
      margin: 0 0 40px 0;
      font-weight: 800;
    }

    .minutes {
      font-size: 8rem;
      font-weight: 900;
      margin: 40px 0 10px 0;
    }

    .label {
      font-size: 3rem;
      font-weight: 800;
    }

    .next-time {
      font-size: 2rem;
      color: white;
      margin-top: 20px;
    }

    .logo {
      position: fixed;
      left: 40px;
      bottom: 30px;
      opacity: 0.95;
    }

    .logo img {
      width: 160px;
      height: auto;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Shuttle Schedule</h1>
    <h2>Next shuttle departing in:</h2>

    <div class="minutes" id="minutes">--</div>
    <div class="label">minutes</div>

    <div class="next-time" id="nextTime">Loading schedule...</div>
  </div>

  <div class="logo">
    <img src="Doubletree_Logo.png" alt="DoubleTree Logo">
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAHdpEZv0Hl9VNXoBJHsZDU7YlFWdqjfMk9OI6k4z1H0WCPmUkhsJIgheofIvB6HoPBGep1sl2VrCG/pub?gid=0&single=true&output=csv";

    function parseTimeToMinutes(timeStr) {
      if (!timeStr) return null;
      timeStr = String(timeStr).trim().replace(/^"|"$/g, "");

      const dateObj = new Date(timeStr);
      if (!isNaN(dateObj)) {
        return dateObj.getHours() * 60 + dateObj.getMinutes();
      }

      const match = timeStr.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (match) {
        let h = parseInt(match[1]);
        let m = parseInt(match[2]);
        let ampm = match[3].toUpperCase();

        if (ampm === "PM" && h !== 12) h += 12;
        if (ampm === "AM" && h === 12) h = 0;

        return h * 60 + m;
      }

      return null;
    }

    function formatTime(mins) {
      let h = Math.floor(mins / 60);
      let m = mins % 60;
      let ampm = h >= 12 ? "PM" : "AM";

      h = h % 12 || 12;
      return `${h}:${String(m).padStart(2, "0")} ${ampm}`;
    }

    async function update() {
      try {
        const res = await fetch(SHEET_CSV_URL + "&t=" + Date.now());
        const text = await res.text();

        const rows = text.split("\n").slice(1);

        const times = rows
          .map(r => parseTimeToMinutes(r))
          .filter(t => t !== null)
          .sort((a, b) => a - b);

        const now = new Date();
        const current = now.getHours() * 60 + now.getMinutes();

        let next = times.find(t => t >= current);

        if (!next) {
          document.getElementById("minutes").textContent = "--";
          document.getElementById("nextTime").textContent = "No more departures today";
          return;
        }

        document.getElementById("minutes").textContent = next - current;
        document.getElementById("nextTime").textContent = "Next departure: " + formatTime(next);

      } catch {
        document.getElementById("nextTime").textContent = "Schedule unavailable";
      }
    }

    update();
    setInterval(update, 60000);
  </script>

</body>
</html>
